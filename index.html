<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS Protocol | Soberania Técnica</title>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .node-card { 
            width: 100%; 
            max-width: 380px; 
            background: #0a0a0a; 
            padding: 40px 25px; 
            border-radius: 30px; 
            border: 1px solid #111; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }
        .tag { 
            color: #d4ff00; 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 20px; 
        }
        h1 { font-size: 1.6rem; margin-bottom: 10px; font-weight: 800; }
        .description { 
            font-size: 0.85rem; 
            color: #777; 
            line-height: 1.6; 
            margin-bottom: 30px; 
        }
        .price { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 25px; }
        .wallet-label { 
            font-size: 0.65rem; 
            color: #444; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        .wallet-addr { 
            background: #000; 
            padding: 15px; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 0.7rem; 
            color: #555; 
            border: 1px solid #151515; 
            word-break: break-all; 
            margin-bottom: 25px; 
        }
        .btn-validate { 
            display: block; 
            background: #d4ff00; 
            color: #000; 
            padding: 20px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.95rem; 
            transition: 0.3s; 
        }
        .btn-validate:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(212, 255, 0, 0.2); 
        }
        .footer { font-size: 0.6rem; color: #222; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="node-card">
        <div class="tag">Protocolo Soberano</div>
        <h1>AXIS Protocol</h1>
        <p class="description">
            Sistema descentralizado de intercâmbio técnico e financeiro Brasil-África. Auditoria de score ativa.
        </p>
        
        <div class="price">10.00 <span style="font-size: 1rem; color: #333;">USD</span></div>
        
        <div class="wallet-label">Endereço de Recebimento (SOL/USDC)</div>
        <div class="wallet-addr">GW4tAHv7JnrhmzmuTJwaw9XoFJab1Vu9nF16dPNtxftS</div>

        <a href="https://forms.gle/2rsDkMrrVdv4LzSx8" class="btn-validate">INICIAR VALIDAÇÃO</a>
        
        <div class="footer">SECURE ENCRYPTED DEPLOYMENT © 2026</div>
    </div>
</body>
</html>
